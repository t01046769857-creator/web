<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>css 적용방법 연습</title>

        <!-- 스타일 적용하는 3가지 방법 -->
         <!-- 1. 외부 스타일 시트(별도의 .css문서를 작성하고 연결) -->
         <link rel="stylesheet" href="./02_test.css">

          <!-- 2. 내부 스타일 시트 -->
          <style>
            /* 이 영역 안에서는 css언어의 문법체계를 따름 */
            p{font-style: italic; color: red !important; !}
          </style>
    </head>
</html>
<body>
    <!-- 3. 인라인 스타일 -->
    <p style="font-weight: bold; color: green;">hello world</p>
</body>
