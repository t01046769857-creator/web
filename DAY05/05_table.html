<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title><table> <style></style></table></title>
        <!-- 내부 스타일 시트 -->

        <style>
            table{
                width: 300px;
                border: 2px solid black;
                /* 내부실선이 2줄로 그려지는 것이 싫다면 두 선을 합치겠다 */
                border-collapse: collapse;
                /* 안에 있는 모든 것들의 수평정렬을 가운데로 */
                text-align: center;
            }

            th, td{border:  1px solid black; padding: 10px 5px;}/*위 아래 여백 10px 좌우 여백 5px*/

            /* 제목줄 칸들에 배경색 지정 */
            th{background-color: green; color: white;}

            /* 짝수줄만 배경색 지정 */
            tr:nth-child(2n){background-color: gainsboro;}

            /* 첫번째 칸들의 너비를 지정 */
            td:first-child{width: 40%;}

            /* 제목줄의 아래 경계선을 적색으로 */
            th{border-bottom: 1.5px double red;}

            /* 직접 만들지 않았지만 그래서 보이지 않지만 실제 table 안에 존재하는 tbody 자식요소 */
            table>:nth-child(1){border: 10px solid blue;}

            /* 그래서 보통 테이블 작업할때는 자식 선택자 대신 자손 선택자를 권장함. */
            table>tr{color:  red;}/*대상이 없음.*/
            table tr{color: pink;}
            /* 책 chapter6~ chapter7까지 모두 완료 */
            /* 수행과제 */
            /* 1. 책 읽고 예제 모두 따라 써보기 */
            /* 2. 각 챕터의 되새김 문제를 풀어보기 */
            <tr>
                <td>김철수</td>
                <td>aa.gnail.com</td>
            </tr

        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>이름</th>
                <th>이메일</th>
            </tr>
            <tr>
                <td>김철수</td>
                <td>aaa.gnail.com</td>
            </tr>

            <tr>
                <td>손흥민</td>
                <td>bbb.gnail.com</td>

            </tr>

            <tr>
                <td>이강인</td>
                <td>ccc.gnail.com</td>
            </tr>

            <tr>
                <td>김민재</td>
                <td>ddd.gnail.com</td>
            </tr>
        </table>
    </body>
</html>
